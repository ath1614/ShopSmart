name: Build, Push & Deploy to ECS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 807717203754.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: shopsmart-backend
  FRONTEND_REPO: shopsmart-frontend
  ECS_CLUSTER: shopsmart-cluster
  BACKEND_SERVICE: shopsmart-backend-service
  FRONTEND_SERVICE: shopsmart-frontend-service
  TASK_DEFINITION: shopsmart-task

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      backend-image: ${{ steps.image-backend.outputs.image }}
      frontend-image: ${{ steps.image-frontend.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::807717203754:role/LabRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        id: image-backend
        working-directory: ./backend
        run: |
          IMAGE_TAG=${{ github.sha }}
          BACKEND_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:$IMAGE_TAG
          BACKEND_LATEST=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest
          
          docker build -t $BACKEND_IMAGE -t $BACKEND_LATEST .
          docker push $BACKEND_IMAGE
          docker push $BACKEND_LATEST
          
          echo "image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Backend image pushed: $BACKEND_IMAGE"

      - name: Build, tag, and push frontend image
        id: image-frontend
        working-directory: ./frontend
        run: |
          IMAGE_TAG=${{ github.sha }}
          FRONTEND_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:$IMAGE_TAG
          FRONTEND_LATEST=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest
          
          docker build -t $FRONTEND_IMAGE -t $FRONTEND_LATEST .
          docker push $FRONTEND_IMAGE
          docker push $FRONTEND_LATEST
          
          echo "image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Frontend image pushed: $FRONTEND_IMAGE"

  deploy-to-ecs:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::807717203754:role/LabRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition with new backend image
        id: task-def-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definition.json
          container-name: shopsmart-backend
          image: ${{ needs.build-and-push.outputs.backend-image }}

      - name: Update ECS task definition with new frontend image
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
          container-name: shopsmart-frontend
          image: ${{ needs.build-and-push.outputs.frontend-image }}

      - name: Deploy to Amazon ECS (Backend Service)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deploy to Amazon ECS (Frontend Service)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Print deployment status
        run: |
          echo "✅ Deployment complete!"
          echo "Backend Service: ${{ env.BACKEND_SERVICE }}"
          echo "Frontend Service: ${{ env.FRONTEND_SERVICE }}"
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.BACKEND_SERVICE }} ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[*].[serviceName,status,runningCount,desiredCount]' \
            --output table
